server:
  interface: 0.0.0.0
  port: 5335

  do-ip4: yes
  do-ip6: no
  do-udp: yes
  do-tcp: yes

  # Only the Docker network should query this resolver.
  access-control: 127.0.0.0/8 allow
  access-control: 172.30.0.0/24 allow

  hide-identity: yes
  hide-version: yes
  qname-minimisation: yes
  harden-glue: yes
  harden-dnssec-stripped: yes
  prefetch: yes
  prefetch-key: yes
  serve-expired: yes

  rrset-cache-size: 256m
  msg-cache-size: 128m
  key-cache-size: 64m
  infra-cache-numhosts: 10000

  username: ""
  chroot: ""
  directory: "/var/lib/unbound"

  auto-trust-anchor-file: "/var/lib/unbound/root.key"

# Local root zone service, refreshed automatically from the root primaries.
auth-zone:
  name: "."
  primary: 192.0.32.132        # xfr.lax.dns.icann.org
  primary: 2620:0:2d0:202::132
  primary: 192.0.47.132        # xfr.cjr.dns.icann.org
  primary: 2620:0:2830:202::132
  fallback-enabled: yes
  for-downstream: no
  for-upstream: yes
  zonefile: "/var/lib/unbound/root.zone"
